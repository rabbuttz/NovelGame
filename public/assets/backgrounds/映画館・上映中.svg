  <rect x="1076" y="382" width="36" height="20" rx="3" fill="url(#seat_color)"/>
  <rect x="1128" y="382" width="36" height="20" rx="3" fill="url(#seat_color)"/>

  <!-- Row 3 (closer) -->
  <rect x="100" y="460" width="1080" height="28" rx="2" fill="#0a0616" opacity="0.98"/>
  <rect x="110" y="443" width="44" height="24" rx="3" fill="url(#seat_color)"/>
  <rect x="170" y="443" width="44" height="24" rx="3" fill="url(#seat_color)"/>
  <rect x="230" y="443" width="44" height="24" rx="3" fill="url(#seat_color)"/>
  <rect x="290" y="443" width="44" height="24" rx="3" fill="url(#seat_color)"/>
  <rect x="350" y="443" width="44" height="24" rx="3" fill="url(#seat_color)"/>
  <rect x="410" y="443" width="44" height="24" rx="3" fill="url(#seat_color)"/>
  <rect x="470" y="443" width="44" height="24" rx="3" fill="url(#seat_color)"/>
  <rect x="530" y="443" width="44" height="24" rx="3" fill="url(#seat_color)"/>
  <rect x="590" y="443" width="44" height="24" rx="3" fill="url(#seat_color)"/>
  <rect x="650" y="443" width="44" height="24" rx="3" fill="url(#seat_color)"/>
  <rect x="710" y="443" width="44" height="24" rx="3" fill="url(#seat_color)"/>
  <rect x="770" y="443" width="44" height="24" rx="3" fill="url(#seat_color)"/>
  <rect x="830" y="443" width="44" height="24" rx="3" fill="url(#seat_color)"/>
  <rect x="890" y="443" width="44" height="24" rx="3" fill="url(#seat_color)"/>
  <rect x="950" y="443" width="44" height="24" rx="3" fill="url(#seat_color)"/>
  <rect x="1010" y="443" width="44" height="24" rx="3" fill="url(#seat_color)"/>
  <rect x="1070" y="443" width="44" height="24" rx="3" fill="url(#seat_color)"/>
  <rect x="1130" y="443" width="44" height="24" rx="3" fill="url(#seat_color)"/>

  <!-- Foreground row (viewer row - large, close) -->
  <rect x="0" y="560" width="1280" height="40" rx="2" fill="#080514" opacity="1"/>
  <!-- Seat backs in front row - larger -->
  <rect x="0" y="530" width="60" height="36" rx="4" fill="#100828"/>
  <rect x="75" y="530" width="60" height="36" rx="4" fill="#100828"/>
  <rect x="150" y="530" width="60" height="36" rx="4" fill="#100828"/>
  <rect x="225" y="530" width="60" height="36" rx="4" fill="#100828"/>
  <rect x="300" y="530" width="60" height="36" rx="4" fill="#100828"/>
  <rect x="375" y="530" width="60" height="36" rx="4" fill="#100828"/>
  <!-- Center gap (viewer seats) -->
  <rect x="450" y="530" width="60" height="36" rx="4" fill="#100828"/>
  <!-- Two special seats slightly different - our protagonist's area -->
  <rect x="525" y="528" width="62" height="38" rx="4" fill="#160e30"/>
  <rect x="603" y="528" width="62" height="38" rx="4" fill="#160e30"/>
  <rect x="680" y="530" width="60" height="36" rx="4" fill="#100828"/>
  <rect x="755" y="530" width="60" height="36" rx="4" fill="#100828"/>
  <rect x="830" y="530" width="60" height="36" rx="4" fill="#100828"/>
  <rect x="905" y="530" width="60" height="36" rx="4" fill="#100828"/>
  <rect x="980" y="530" width="60" height="36" rx="4" fill="#100828"/>
  <rect x="1055" y="530" width="60" height="36" rx="4" fill="#100828"/>
  <rect x="1130" y="530" width="60" height="36" rx="4" fill="#100828"/>
  <rect x="1205" y="530" width="75" height="36" rx="4" fill="#100828"/>

  <!-- Floor of cinema -->
  <rect y="596" width="1280" height="124" fill="#020106"/>

  <!-- Aisle lights (tiny dots on floor) -->
  <circle cx="95" cy="600" r="2" fill="#4020a0" opacity="0.5"/>
  <circle cx="95" cy="630" r="2" fill="#4020a0" opacity="0.5"/>
  <circle cx="95" cy="660" r="2" fill="#4020a0" opacity="0.5"/>
  <circle cx="95" cy="690" r="2" fill="#4020a0" opacity="0.5"/>
  <circle cx="1185" cy="600" r="2" fill="#4020a0" opacity="0.5"/>
  <circle cx="1185" cy="630" r="2" fill="#4020a0" opacity="0.5"/>
  <circle cx="1185" cy="660" r="2" fill="#4020a0" opacity="0.5"/>
  <circle cx="1185" cy="690" r="2" fill="#4020a0" opacity="0.5"/>

  <!-- Screen glow reflecting on nearest seats/floor -->
  <rect x="400" y="520" width="480" height="20" fill="#8090b0" opacity="0.04"/>

  <!-- Overall dark vignette -->
  <rect width="1280" height="720" fill="radial-gradient(ellipse at center, transparent 40%, #000008 100%)" opacity="0.3"/>

  <!-- Dark foreground overlay for depth -->
  <rect y="600" width="1280" height="120" fill="#010105" opacity="0.8"/>
</svg>
