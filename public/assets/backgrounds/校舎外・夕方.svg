<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="35%" stop-color="#8b2fc9"/>
      <stop offset="65%" stop-color="#e8642a"/>
      <stop offset="85%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#f7c56a"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3028"/>
      <stop offset="100%" stop-color="#1e1810"/>
    </linearGradient>
    <linearGradient id="building" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2035"/>
      <stop offset="100%" stop-color="#1a1525"/>
    </linearGradient>
    <linearGradient id="win_glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="100%" stop-color="#ffb347"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1280" height="720" fill="url(#sky)"/>

  <!-- Clouds (silhouette) -->
  <ellipse cx="200" cy="160" rx="120" ry="30" fill="#c05a1f" opacity="0.4"/>
  <ellipse cx="320" cy="145" rx="90" ry="22" fill="#c05a1f" opacity="0.35"/>
  <ellipse cx="900" cy="130" rx="140" ry="28" fill="#c05a1f" opacity="0.3"/>
  <ellipse cx="1050" cy="115" rx="100" ry="20" fill="#c05a1f" opacity="0.25"/>

  <!-- Ground -->
  <rect y="560" width="1280" height="160" fill="url(#ground)"/>

  <!-- Distant trees (left) -->
  <rect x="0" y="440" width="18" height="120" fill="#1a1510"/>
  <ellipse cx="9" cy="435" rx="28" ry="45" fill="#1a1510"/>
  <rect x="45" y="460" width="14" height="100" fill="#1a1510"/>
  <ellipse cx="52" cy="455" rx="22" ry="38" fill="#1a1510"/>
  <rect x="80" y="450" width="16" height="110" fill="#1a1510"/>
  <ellipse cx="88" cy="445" rx="25" ry="42" fill="#1a1510"/>

  <!-- Distant trees (right) -->
  <rect x="1180" y="445" width="18" height="115" fill="#1a1510"/>
  <ellipse cx="1189" cy="440" rx="28" ry="44" fill="#1a1510"/>
  <rect x="1228" y="460" width="14" height="100" fill="#1a1510"/>
  <ellipse cx="1235" cy="455" rx="22" ry="36" fill="#1a1510"/>

  <!-- School building (main block) -->
  <rect x="180" y="240" width="920" height="320" fill="url(#building)"/>

  <!-- Roof line detail -->
  <rect x="180" y="230" width="920" height="15" fill="#1a1525"/>
  <rect x="160" y="225" width="960" height="12" fill="#15101e"/>

  <!-- Windows - row 1 -->
  <rect x="220" y="270" width="55" height="70" rx="3" fill="url(#win_glow)" opacity="0.9" filter="url(#glow)"/>
  <rect x="300" y="270" width="55" height="70" rx="3" fill="url(#win_glow)" opacity="0.85" filter="url(#glow)"/>
  <rect x="380" y="270" width="55" height="70" rx="3" fill="#1e1830" opacity="0.8"/>
  <rect x="460" y="270" width="55" height="70" rx="3" fill="url(#win_glow)" opacity="0.75" filter="url(#glow)"/>
  <rect x="540" y="270" width="55" height="70" rx="3" fill="#1e1830" opacity="0.8"/>
  <rect x="620" y="270" width="55" height="70" rx="3" fill="url(#win_glow)" opacity="0.9" filter="url(#glow)"/>
  <rect x="700" y="270" width="55" height="70" rx="3" fill="url(#win_glow)" opacity="0.7" filter="url(#glow)"/>
  <rect x="780" y="270" width="55" height="70" rx="3" fill="#1e1830" opacity="0.8"/>
  <rect x="860" y="270" width="55" height="70" rx="3" fill="url(#win_glow)" opacity="0.85" filter="url(#glow)"/>
  <rect x="940" y="270" width="55" height="70" rx="3" fill="url(#win_glow)" opacity="0.8" filter="url(#glow)"/>
  <rect x="1020" y="270" width="55" height="70" rx="3" fill="#1e1830" opacity="0.8"/>

  <!-- Windows - row 2 -->
  <rect x="220" y="370" width="55" height="70" rx="3" fill="#1e1830" opacity="0.8"/>
  <rect x="300" y="370" width="55" height="70" rx="3" fill="url(#win_glow)" opacity="0.9" filter="url(#glow)"/>
  <rect x="380" y="370" width="55" height="70" rx="3" fill="url(#win_glow)" opacity="0.8" filter="url(#glow)"/>
  <rect x="460" y="370" width="55" height="70" rx="3" fill="url(#win_glow)" opacity="0.85" filter="url(#glow)"/>
  <rect x="540" y="370" width="55" height="70" rx="3" fill="#1e1830" opacity="0.8"/>
  <rect x="620" y="370" width="55" height="70" rx="3" fill="#1e1830" opacity="0.8"/>
  <rect x="700" y="370" width="55" height="70" rx="3" fill="url(#win_glow)" opacity="0.75" filter="url(#glow)"/>
  <rect x="780" y="370" width="55" height="70" rx="3" fill="url(#win_glow)" opacity="0.9" filter="url(#glow)"/>
  <rect x="860" y="370" width="55" height="70" rx="3" fill="#1e1830" opacity="0.8"/>
  <rect x="940" y="370" width="55" height="70" rx="3" fill="url(#win_glow)" opacity="0.8" filter="url(#glow)"/>
  <rect x="1020" y="370" width="55" height="70" rx="3" fill="url(#win_glow)" opacity="0.85" filter="url(#glow)"/>

  <!-- Entrance door -->
  <rect x="590" y="460" width="100" height="100" rx="4" fill="#12100e"/>
  <rect x="600" y="463" width="38" height="95" rx="2" fill="#1a1510"/>
  <rect x="642" y="463" width="38" height="95" rx="2" fill="#1a1510"/>
  <circle cx="638" cy="512" r="4" fill="#888"/>
  <circle cx="642" cy="512" r="4" fill="#888"/>

  <!-- Path / walkway -->
  <polygon points="560,560 720,560 760,720 520,720" fill="#2e2820"/>
  <polygon points="575,560 705,560 740,720 540,720" fill="#332c24"/>

  <!-- Foreground ground shadow -->
  <rect y="580" width="1280" height="140" fill="#0f0c08" opacity="0.5"/>

  <!-- Stars -->
  <circle cx="100" cy="50" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="250" cy="30" r="1" fill="white" opacity="0.6"/>
  <circle cx="450" cy="20" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="650" cy="35" r="1" fill="white" opacity="0.6"/>
  <circle cx="850" cy="25" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="1050" cy="40" r="1" fill="white" opacity="0.5"/>
  <circle cx="1200" cy="15" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="1150" cy="60" r="1" fill="white" opacity="0.4"/>
  <circle cx="350" cy="60" r="1" fill="white" opacity="0.5"/>
  <circle cx="760" cy="15" r="1" fill="white" opacity="0.6"/>
</svg>
