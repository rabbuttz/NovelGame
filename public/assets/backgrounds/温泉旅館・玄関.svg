<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0e2a"/>
      <stop offset="60%" stop-color="#3d1f4a"/>
      <stop offset="100%" stop-color="#6b3060"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1410"/>
      <stop offset="100%" stop-color="#0a0806"/>
    </linearGradient>
    <linearGradient id="building" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1c10"/>
      <stop offset="100%" stop-color="#1a1008"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#120c08"/>
      <stop offset="100%" stop-color="#1e1610"/>
    </linearGradient>
    <radialGradient id="lantern_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd080" stop-opacity="1"/>
      <stop offset="40%" stop-color="#ff9020" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff6000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="door_light" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ffe8c0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff8020" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1280" height="720" fill="url(#sky)"/>

  <!-- Stars -->
  <circle cx="100" cy="40" r="1.2" fill="#fff" opacity="0.7"/>
  <circle cx="230" cy="80" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="380" cy="30" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="520" cy="60" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="700" cy="25" r="1.2" fill="#fff" opacity="0.7"/>
  <circle cx="850" cy="55" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="1000" cy="35" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="1150" cy="70" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="1220" cy="20" r="1.2" fill="#fff" opacity="0.7"/>
  <circle cx="60" cy="110" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="450" cy="100" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="900" cy="90" r="1.2" fill="#fff" opacity="0.6"/>
  <!-- Moon -->
  <circle cx="1100" cy="90" r="30" fill="#f8f0d8" opacity="0.9" filter="url(#soft)"/>
  <circle cx="1113" cy="82" r="26" fill="#2a1840" opacity="0.3"/>

  <!-- Trees left -->
  <rect x="0" y="200" width="30" height="320" rx="5" fill="#0a1a08"/>
  <ellipse cx="15" cy="200" rx="55" ry="120" fill="#0d2010"/>
  <ellipse cx="15" cy="160" rx="40" ry="80" fill="#0f2812"/>

  <!-- Trees right -->
  <rect x="1250" y="200" width="30" height="320" rx="5" fill="#0a1a08"/>
  <ellipse cx="1265" cy="200" rx="55" ry="120" fill="#0d2010"/>
  <ellipse cx="1265" cy="160" rx="40" ry="80" fill="#0f2812"/>
  <!-- More trees right -->
  <rect x="1180" y="250" width="20" height="280" rx="4" fill="#0a1a08"/>
  <ellipse cx="1190" cy="250" rx="40" ry="90" fill="#0d2010"/>

  <!-- Main building -->
  <rect x="160" y="200" width="960" height="420" fill="url(#building)"/>

  <!-- Roof main -->
  <polygon points="120,220 640,120 1160,220" fill="url(#roof)"/>
  <!-- Roof ridge -->
  <rect x="120" y="214" width="1040" height="12" rx="4" fill="#0a0806"/>
  <!-- Roof eave detail -->
  <rect x="120" y="218" width="1040" height="6" fill="#161008" opacity="0.7"/>
  <!-- Sub-roof left wing -->
  <polygon points="80,380 260,280 440,380" fill="url(#roof)"/>
  <rect x="80" y="374" width="360" height="8" rx="2" fill="#0a0806"/>
  <!-- Sub-roof right wing -->
  <polygon points="840,380 1020,280 1200,380" fill="url(#roof)"/>
  <rect x="840" y="374" width="360" height="8" rx="2" fill="#0a0806"/>

  <!-- Building vertical wood beams -->
  <rect x="160" y="200" width="12" height="420" fill="#120e08"/>
  <rect x="360" y="200" width="10" height="420" fill="#120e08"/>
  <rect x="560" y="200" width="10" height="420" fill="#120e08"/>
  <rect x="720" y="200" width="10" height="420" fill="#120e08"/>
  <rect x="920" y="200" width="10" height="420" fill="#120e08"/>
  <rect x="1108" y="200" width="12" height="420" fill="#120e08"/>

  <!-- Windows - upper floor (shoji screens glowing) -->
  <!-- Left windows -->
  <rect x="180" y="260" width="160" height="110" rx="3" fill="#1a1008"/>
  <rect x="182" y="262" width="156" height="106" rx="2" fill="#ffe8a0" opacity="0.15"/>
  <!-- Grid lines for shoji -->
  <line x1="240" y1="262" x2="240" y2="368" stroke="#2a1e10" stroke-width="1.5"/>
  <line x1="280" y1="262" x2="280" y2="368" stroke="#2a1e10" stroke-width="1.5"/>
  <line x1="320" y1="262" x2="320" y2="368" stroke="#2a1e10" stroke-width="1.5"/>
  <line x1="182" y1="310" x2="338" y2="310" stroke="#2a1e10" stroke-width="1.5"/>
  <rect x="180" y="260" width="160" height="110" rx="3" fill="#ffd060" opacity="0.12"/>

  <!-- Center windows upper -->
  <rect x="440" y="220" width="400" height="130" rx="3" fill="#1a1008"/>
  <rect x="442" y="222" width="396" height="126" rx="2" fill="#ffe8a0" opacity="0.18"/>
  <line x1="540" y1="222" x2="540" y2="348" stroke="#2a1e10" stroke-width="1.5"/>
  <line x1="620" y1="222" x2="620" y2="348" stroke="#2a1e10" stroke-width="1.5"/>
  <line x1="700" y1="222" x2="700" y2="348" stroke="#2a1e10" stroke-width="1.5"/>
  <line x1="780" y1="222" x2="780" y2="348" stroke="#2a1e10" stroke-width="1.5"/>
  <line x1="442" y1="285" x2="838" y2="285" stroke="#2a1e10" stroke-width="1.5"/>
  <rect x="440" y="220" width="400" height="130" rx="3" fill="#ffd060" opacity="0.15"/>

  <!-- Right windows upper -->
  <rect x="940" y="260" width="160" height="110" rx="3" fill="#1a1008"/>
  <rect x="942" y="262" width="156" height="106" rx="2" fill="#ffe8a0" opacity="0.15"/>
  <line x1="1000" y1="262" x2="1000" y2="368" stroke="#2a1e10" stroke-width="1.5"/>
  <line x1="1040" y1="262" x2="1040" y2="368" stroke="#2a1e10" stroke-width="1.5"/>
  <line x1="1080" y1="262" x2="1080" y2="368" stroke="#2a1e10" stroke-width="1.5"/>
  <line x1="942" y1="310" x2="1098" y2="310" stroke="#2a1e10" stroke-width="1.5"/>
  <rect x="940" y="260" width="160" height="110" rx="3" fill="#ffd060" opacity="0.12"/>

  <!-- Entrance gate structure -->
  <rect x="480" y="380" width="320" height="240" fill="#1c1408"/>
  <!-- Entrance door frame -->
  <rect x="500" y="390" width="280" height="230" rx="2" fill="#120e06"/>
  <!-- Door panels -->
  <rect x="505" y="395" width="130" height="220" rx="2" fill="#1a1208"/>
  <rect x="645" y="395" width="130" height="220" rx="2" fill="#1a1208"/>
  <!-- Inner light from entrance -->
  <rect x="505" y="395" width="130" height="220" rx="2" fill="url(#door_light)" opacity="0.4"/>
  <rect x="645" y="395" width="130" height="220" rx="2" fill="url(#door_light)" opacity="0.3"/>
  <!-- Door grid -->
  <line x1="540" y1="395" x2="540" y2="615" stroke="#2a1e10" stroke-width="1"/>
  <line x1="575" y1="395" x2="575" y2="615" stroke="#2a1e10" stroke-width="1"/>
  <line x1="610" y1="395" x2="610" y2="615" stroke="#2a1e10" stroke-width="1"/>
  <line x1="505" y1="460" x2="635" y2="460" stroke="#2a1e10" stroke-width="1"/>
  <line x1="505" y1="530" x2="635" y2="530" stroke="#2a1e10" stroke-width="1"/>
  <line x1="680" y1="395" x2="680" y2="615" stroke="#2a1e10" stroke-width="1"/>
  <line x1="715" y1="395" x2="715" y2="615" stroke="#2a1e10" stroke-width="1"/>
  <line x1="750" y1="395" x2="750" y2="615" stroke="#2a1e10" stroke-width="1"/>
  <line x1="645" y1="460" x2="775" y2="460" stroke="#2a1e10" stroke-width="1"/>
  <line x1="645" y1="530" x2="775" y2="530" stroke="#2a1e10" stroke-width="1"/>

  <!-- Noren (暖簾) hanging above door -->
  <rect x="510" y="375" width="40" height="50" rx="2" fill="#8b1c1c"/>
  <rect x="558" y="375" width="40" height="55" rx="2" fill="#8b1c1c"/>
  <rect x="606" y="375" width="40" height="48" rx="2" fill="#8b1c1c"/>
  <rect x="654" y="375" width="40" height="52" rx="2" fill="#8b1c1c"/>
  <rect x="702" y="375" width="40" height="50" rx="2" fill="#8b1c1c"/>
  <!-- Noren text area -->
  <rect x="590" y="383" width="20" height="36" rx="1" fill="#c83030" opacity="0.6"/>

  <!-- Stone lanterns (灯籠) -->
  <!-- Left lantern -->
  <rect x="340" y="480" width="18" height="90" fill="#2a2420"/>
  <rect x="320" y="570" width="58" height="10" rx="2" fill="#2a2420"/>
  <rect x="330" y="455" width="38" height="30" rx="3" fill="#ffd080" opacity="0.9" filter="url(#glow)"/>
  <rect x="328" y="450" width="42" height="8" rx="2" fill="#1e1a16"/>
  <rect x="328" y="483" width="42" height="5" rx="1" fill="#1e1a16"/>
  <ellipse cx="349" cy="530" rx="90" ry="30" fill="url(#lantern_glow)" opacity="0.3" filter="url(#glow)"/>

  <!-- Right lantern -->
  <rect x="922" y="480" width="18" height="90" fill="#2a2420"/>
  <rect x="902" y="570" width="58" height="10" rx="2" fill="#2a2420"/>
  <rect x="912" y="455" width="38" height="30" rx="3" fill="#ffd080" opacity="0.9" filter="url(#glow)"/>
  <rect x="910" y="450" width="42" height="8" rx="2" fill="#1e1a16"/>
  <rect x="910" y="483" width="42" height="5" rx="1" fill="#1e1a16"/>
  <ellipse cx="931" cy="530" rx="90" ry="30" fill="url(#lantern_glow)" opacity="0.3" filter="url(#glow)"/>

  <!-- Stone path -->
  <rect x="540" y="600" width="200" height="120" fill="#201a16" opacity="0.8"/>
  <ellipse cx="570" cy="640" rx="22" ry="14" fill="#2a2420"/>
  <ellipse cx="640" cy="660" rx="20" ry="12" fill="#282018"/>
  <ellipse cx="710" cy="638" rx="22" ry="14" fill="#2a2420"/>
  <ellipse cx="580" cy="695" rx="18" ry="10" fill="#282018"/>
  <ellipse cx="660" cy="700" rx="20" ry="11" fill="#2a2420"/>

  <!-- Ground -->
  <rect x="0" y="600" width="1280" height="120" fill="url(#ground)"/>
  <!-- Ground path -->
  <rect x="0" y="600" width="1280" height="5" fill="#2a2018" opacity="0.5"/>

  <!-- Hanging lanterns from roof eave -->
  <line x1="320" y1="218" x2="320" y2="280" stroke="#2a1a10" stroke-width="1.5"/>
  <ellipse cx="320" cy="285" rx="14" ry="20" fill="#ffd880" opacity="0.85" filter="url(#soft)"/>
  <ellipse cx="320" cy="270" rx="10" ry="6" fill="#1a1008"/>
  <ellipse cx="320" cy="300" rx="10" ry="6" fill="#1a1008"/>

  <line x1="640" y1="180" x2="640" y2="250" stroke="#2a1a10" stroke-width="1.5"/>
  <ellipse cx="640" cy="256" rx="16" ry="22" fill="#ffd880" opacity="0.9" filter="url(#soft)"/>
  <ellipse cx="640" cy="240" rx="11" ry="7" fill="#1a1008"/>
  <ellipse cx="640" cy="272" rx="11" ry="7" fill="#1a1008"/>
  <ellipse cx="640" cy="340" rx="120" ry="20" fill="url(#lantern_glow)" opacity="0.15"/>

  <line x1="960" y1="218" x2="960" y2="280" stroke="#2a1a10" stroke-width="1.5"/>
  <ellipse cx="960" cy="285" rx="14" ry="20" fill="#ffd880" opacity="0.85" filter="url(#soft)"/>
  <ellipse cx="960" cy="270" rx="10" ry="6" fill="#1a1008"/>
  <ellipse cx="960" cy="300" rx="10" ry="6" fill="#1a1008"/>

  <!-- Sign board -->
  <rect x="550" y="340" width="180" height="38" rx="3" fill="#2a1808"/>
  <rect x="552" y="342" width="176" height="34" rx="2" fill="none" stroke="#c08040" stroke-width="1.5"/>
  <rect x="575" y="350" width="130" height="18" rx="2" fill="#c08040" opacity="0.4"/>

  <!-- Foreground shadow -->
  <rect y="680" width="1280" height="40" fill="#050302" opacity="0.8"/>
</svg>
