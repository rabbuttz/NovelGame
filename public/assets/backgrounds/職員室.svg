<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4c9b0"/>
      <stop offset="100%" stop-color="#bfb49a"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b7355"/>
      <stop offset="100%" stop-color="#6b5640"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8a96e"/>
      <stop offset="100%" stop-color="#a0804a"/>
    </linearGradient>
    <linearGradient id="window_sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0cce8"/>
      <stop offset="100%" stop-color="#e8d8b0"/>
    </linearGradient>
    <linearGradient id="cabinet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8a9090"/>
      <stop offset="100%" stop-color="#6a7070"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Wall -->
  <rect width="1280" height="720" fill="url(#wall)"/>

  <!-- Ceiling line -->
  <rect y="0" width="1280" height="8" fill="#b0a590"/>

  <!-- Wainscoting -->
  <rect y="580" width="1280" height="10" fill="#a09070"/>

  <!-- Floor -->
  <rect y="590" width="1280" height="130" fill="url(#floor)"/>

  <!-- Floor planks -->
  <line x1="0" y1="610" x2="1280" y2="610" stroke="#7a6240" stroke-width="1.5" opacity="0.5"/>
  <line x1="0" y1="630" x2="1280" y2="630" stroke="#7a6240" stroke-width="1.5" opacity="0.5"/>
  <line x1="0" y1="650" x2="1280" y2="650" stroke="#7a6240" stroke-width="1.5" opacity="0.5"/>
  <line x1="0" y1="670" x2="1280" y2="670" stroke="#7a6240" stroke-width="1.5" opacity="0.5"/>
  <line x1="0" y1="690" x2="1280" y2="690" stroke="#7a6240" stroke-width="1.5" opacity="0.5"/>
  <line x1="160" y1="590" x2="0" y2="720" stroke="#7a6240" stroke-width="1" opacity="0.3"/>
  <line x1="320" y1="590" x2="160" y2="720" stroke="#7a6240" stroke-width="1" opacity="0.3"/>
  <line x1="480" y1="590" x2="320" y2="720" stroke="#7a6240" stroke-width="1" opacity="0.3"/>
  <line x1="640" y1="590" x2="480" y2="720" stroke="#7a6240" stroke-width="1" opacity="0.3"/>
  <line x1="800" y1="590" x2="640" y2="720" stroke="#7a6240" stroke-width="1" opacity="0.3"/>
  <line x1="960" y1="590" x2="800" y2="720" stroke="#7a6240" stroke-width="1" opacity="0.3"/>
  <line x1="1120" y1="590" x2="960" y2="720" stroke="#7a6240" stroke-width="1" opacity="0.3"/>
  <line x1="1280" y1="590" x2="1120" y2="720" stroke="#7a6240" stroke-width="1" opacity="0.3"/>

  <!-- Window (left) -->
  <rect x="60" y="80" width="200" height="280" rx="3" fill="#c8d8e8" stroke="#a09070" stroke-width="6"/>
  <rect x="60" y="80" width="200" height="280" rx="3" fill="url(#window_sky)" opacity="0.8"/>
  <!-- Window frame cross -->
  <rect x="155" y="80" width="10" height="280" fill="#a09070"/>
  <rect x="60" y="218" width="200" height="8" fill="#a09070"/>
  <!-- Window sill -->
  <rect x="50" y="354" width="220" height="14" rx="2" fill="#b0a080"/>
  <!-- Curtain left -->
  <rect x="50" y="75" width="35" height="295" fill="#c8b898" opacity="0.9"/>
  <!-- Curtain right -->
  <rect x="235" y="75" width="35" height="295" fill="#c8b898" opacity="0.9"/>

  <!-- Window (right) -->
  <rect x="1020" y="80" width="200" height="280" rx="3" fill="#c8d8e8" stroke="#a09070" stroke-width="6"/>
  <rect x="1020" y="80" width="200" height="280" rx="3" fill="url(#window_sky)" opacity="0.8"/>
  <rect x="1115" y="80" width="10" height="280" fill="#a09070"/>
  <rect x="1020" y="218" width="200" height="8" fill="#a09070"/>
  <rect x="1010" y="354" width="220" height="14" rx="2" fill="#b0a080"/>
  <rect x="1010" y="75" width="35" height="295" fill="#c8b898" opacity="0.9"/>
  <rect x="1195" y="75" width="35" height="295" fill="#c8b898" opacity="0.9"/>

  <!-- Filing cabinets (back wall) -->
  <rect x="330" y="120" width="80" height="460" fill="url(#cabinet)" rx="2"/>
  <rect x="415" y="120" width="80" height="460" fill="#7a8080" rx="2"/>
  <rect x="500" y="120" width="80" height="460" fill="url(#cabinet)" rx="2"/>
  <!-- Cabinet handles -->
  <rect x="362" y="200" width="16" height="4" rx="2" fill="#ccc"/>
  <rect x="362" y="290" width="16" height="4" rx="2" fill="#ccc"/>
  <rect x="362" y="380" width="16" height="4" rx="2" fill="#ccc"/>
  <rect x="362" y="470" width="16" height="4" rx="2" fill="#ccc"/>
  <rect x="447" y="200" width="16" height="4" rx="2" fill="#ccc"/>
  <rect x="447" y="290" width="16" height="4" rx="2" fill="#ccc"/>
  <rect x="447" y="380" width="16" height="4" rx="2" fill="#ccc"/>
  <rect x="447" y="470" width="16" height="4" rx="2" fill="#ccc"/>
  <rect x="532" y="200" width="16" height="4" rx="2" fill="#ccc"/>
  <rect x="532" y="290" width="16" height="4" rx="2" fill="#ccc"/>
  <rect x="532" y="380" width="16" height="4" rx="2" fill="#ccc"/>
  <rect x="532" y="470" width="16" height="4" rx="2" fill="#ccc"/>

  <!-- Desk (center-right) -->
  <rect x="650" y="430" width="480" height="150" fill="url(#desk)" rx="4" filter="url(#shadow)"/>
  <!-- Desk top surface -->
  <rect x="650" y="430" width="480" height="18" rx="4" fill="#d4b87a"/>
  <!-- Desk legs -->
  <rect x="665" y="575" width="20" height="15" fill="#907840"/>
  <rect x="1095" y="575" width="20" height="15" fill="#907840"/>
  <!-- Items on desk -->
  <!-- Monitor -->
  <rect x="850" y="360" width="130" height="80" rx="4" fill="#222" filter="url(#shadow)"/>
  <rect x="856" y="366" width="118" height="68" rx="2" fill="#1a2a3a"/>
  <rect x="905" y="440" width="20" height="10" fill="#333"/>
  <rect x="895" y="448" width="40" height="4" rx="2" fill="#333"/>
  <!-- Papers / files -->
  <rect x="680" y="415" width="80" height="18" rx="1" fill="#f0ebe0" transform="rotate(-3 680 415)"/>
  <rect x="688" y="412" width="80" height="18" rx="1" fill="#f5f0e5" transform="rotate(1 688 412)"/>
  <!-- Pen stand -->
  <rect x="1080" y="415" width="28" height="32" rx="3" fill="#7a6850"/>
  <rect x="1085" y="405" width="4" height="15" fill="#4a4a4a"/>
  <rect x="1092" y="400" width="4" height="20" fill="#6a6a6a"/>
  <rect x="1099" y="408" width="4" height="12" fill="#3a3a3a"/>

  <!-- Chair -->
  <rect x="840" y="530" width="100" height="60" rx="4" fill="#3a3030" opacity="0.85" filter="url(#shadow)"/>
  <rect x="840" y="490" width="100" height="45" rx="4" fill="#3a3030" opacity="0.85"/>
  <rect x="870" y="550" width="12" height="40" fill="#2a2020"/>
  <rect x="902" y="550" width="12" height="40" fill="#2a2020"/>
  <ellipse cx="890" cy="592" rx="60" ry="8" fill="#2a2020" opacity="0.7"/>

  <!-- Blackboard / whiteboard on wall -->
  <rect x="620" y="60" width="380" height="200" rx="4" fill="#2a4a3a" stroke="#5a4a30" stroke-width="5"/>
  <!-- Board lines -->
  <line x1="640" y1="100" x2="980" y2="100" stroke="#4a7a5a" stroke-width="1" opacity="0.5"/>
  <line x1="640" y1="130" x2="980" y2="130" stroke="#4a7a5a" stroke-width="1" opacity="0.5"/>
  <line x1="640" y1="160" x2="980" y2="160" stroke="#4a7a5a" stroke-width="1" opacity="0.5"/>
  <line x1="640" y1="190" x2="980" y2="190" stroke="#4a7a5a" stroke-width="1" opacity="0.5"/>
  <line x1="640" y1="220" x2="980" y2="220" stroke="#4a7a5a" stroke-width="1" opacity="0.5"/>
  <!-- Chalk text (abstract) -->
  <rect x="660" y="92" width="60" height="6" rx="3" fill="#e8e0d0" opacity="0.6"/>
  <rect x="730" y="92" width="40" height="6" rx="3" fill="#e8e0d0" opacity="0.5"/>
  <rect x="780" y="92" width="80" height="6" rx="3" fill="#e8e0d0" opacity="0.6"/>
  <rect x="660" y="122" width="90" height="6" rx="3" fill="#e8e0d0" opacity="0.55"/>
  <rect x="760" y="122" width="50" height="6" rx="3" fill="#e8e0d0" opacity="0.5"/>
  <rect x="820" y="122" width="70" height="6" rx="3" fill="#e8e0d0" opacity="0.6"/>
  <!-- Board eraser tray -->
  <rect x="620" y="255" width="380" height="8" rx="2" fill="#5a4a30"/>

  <!-- Small plant on window sill (left) -->
  <rect x="225" y="335" width="18" height="20" rx="2" fill="#8b6040"/>
  <ellipse cx="234" cy="330" rx="18" ry="14" fill="#4a8040"/>
  <ellipse cx="222" cy="325" rx="12" ry="10" fill="#5a9050"/>
  <ellipse cx="246" cy="328" rx="10" ry="8" fill="#3a7030"/>

  <!-- Clock on wall -->
  <circle cx="1200" cy="90" r="38" fill="#f5f0e0" stroke="#8a7a60" stroke-width="5"/>
  <circle cx="1200" cy="90" r="3" fill="#333"/>
  <line x1="1200" y1="90" x2="1200" y2="62" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <line x1="1200" y1="90" x2="1220" y2="97" stroke="#555" stroke-width="2" stroke-linecap="round"/>

  <!-- Ambient light overlay -->
  <rect width="1280" height="720" fill="#fff8e8" opacity="0.07"/>
</svg>
